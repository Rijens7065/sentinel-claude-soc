name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  TF_VERSION: "1.9.0"
  TF_WORKING_DIR: terraform
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"

jobs:
  drift-detect:
    name: Detect Infrastructure Drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config="use_oidc=true"

      - name: Terraform Refresh-Only Plan
        id: drift
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set +e
          terraform plan \
            -refresh-only \
            -var="subscription_id=$ARM_SUBSCRIPTION_ID" \
            -var="tenant_id=$ARM_TENANT_ID" \
            -compact-warnings \
            -detailed-exitcode \
            -no-color 2>&1 | tee drift_report.txt
          EXITCODE=${PIPESTATUS[0]}
          echo "exitcode=$EXITCODE" >> "$GITHUB_OUTPUT"
          set -e
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Open GitHub Issue if drift found
        if: steps.drift.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('${{ env.TF_WORKING_DIR }}/drift_report.txt', 'utf8');
            const maxLen = 65000;
            const truncated = report.length > maxLen
              ? report.substring(0, maxLen) + '\n\n... (truncated)'
              : report;

            const title = `[DRIFT DETECTED] Infrastructure drift found — ${new Date().toISOString().split('T')[0]}`;
            const body = `## Infrastructure Drift Detected

            The daily Terraform drift detection run found differences between the Terraform state and the actual Azure infrastructure.

            **This means resources have been modified, created, or deleted outside of Terraform.**

            ### Drift Report

            <details><summary>Show drift details</summary>

            \`\`\`
            ${truncated}
            \`\`\`

            </details>

            ### Required Action

            Review the drift above and choose one of:

            - [ ] **Update Terraform** to match the current Azure state (import or modify .tf files)
            - [ ] **Revert Azure** to match Terraform state (run \`terraform apply\` after review and approval)
            - [ ] **Investigate** — determine if this drift is expected or a security concern

            > **No automatic changes will be made.** All remediation requires human approval and pipeline execution.

            > Detected at: \`${{ github.run_id }}\` — \`${new Date().toISOString()}\``;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['drift-detected', 'infrastructure']
            });

      - name: No drift found
        if: steps.drift.outputs.exitcode == '0'
        run: echo "No drift detected. Infrastructure matches Terraform state."

      - name: Plan error
        if: steps.drift.outputs.exitcode == '1'
        run: |
          echo "Terraform plan encountered an error. Review the logs above."
          exit 1
